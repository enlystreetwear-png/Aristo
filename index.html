<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --card: #222;
    --border: #2e2e2e; --accent: #d4a853; --text: #f0ece4;
    --muted: #888; --danger: #e05a5a; --success: #5ab88a; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* LOGIN */
  #login-screen {
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #1e1500 0%, #0f0f0f 60%);
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 48px 40px;
    width: 100%; max-width: 420px; box-shadow: 0 30px 80px rgba(0,0,0,.6);
  }
  .brand { text-align: center; margin-bottom: 36px; }
  .brand-icon {
    width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), #a07030);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin: 0 auto 14px;
  }
  .brand h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--accent); }
  .brand p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .role-tabs { display: flex; gap: 8px; margin-bottom: 28px; background: var(--card); border-radius: 10px; padding: 4px; }
  .role-tab {
    flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all .2s;
  }
  .role-tab.active { background: var(--accent); color: #000; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
  .form-group input {
    width: 100%; padding: 12px 16px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border .2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .btn-primary {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #a07030);
    border: none; border-radius: 10px; color: #000; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .error-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

  /* TOPBAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-brand { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 20px; }
  .topbar-role { font-size: 12px; color: var(--muted); background: var(--card); padding: 4px 10px; border-radius: 20px; }
  .btn-logout {
    padding: 8px 18px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  .content { flex: 1; padding: 28px; max-width: 960px; width: 100%; margin: 0 auto; }
  .date-bar, .owner-date-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .date-bar label, .owner-date-bar label { font-size: 13px; color: var(--muted); }
  .date-bar input[type="date"], .owner-date-bar input[type="date"] {
    padding: 9px 14px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; cursor: pointer;
  }
  .date-bar input[type="date"]:focus, .owner-date-bar input[type="date"]:focus { border-color: var(--accent); }

  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
  .section-title {
    font-size: 13px; color: var(--accent); letter-spacing: .8px; text-transform: uppercase;
    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; display: block; }

  /* SUPPLIER BLOCK */
  .supplier-block { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 18px; overflow: hidden; }

  .supplier-header {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 16px; background: var(--card); border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .supplier-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
  .supplier-name-input {
    flex: 1; min-width: 140px; background: transparent; border: none;
    border-bottom: 1px solid var(--border); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    outline: none; padding: 2px 4px; transition: border .2s;
  }
  .supplier-name-input:focus { border-bottom-color: var(--accent); }
  .supplier-name-input::placeholder { color: #444; font-weight: 400; }
  .btn-remove-sup {
    padding: 6px 14px; background: transparent; border: 1px solid var(--danger);
    color: var(--danger); border-radius: 7px; cursor: pointer; font-size: 12px;
    font-family: 'DM Sans', sans-serif; font-weight: 600; white-space: nowrap; transition: all .2s;
  }
  .btn-remove-sup:hover { background: var(--danger); color: #fff; }

  /* Bill upload inside supplier */
  .supplier-bill-section { padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.01); }
  .bill-mini-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }

  .upload-mini {
    border: 1px dashed var(--border); border-radius: 8px; padding: 12px 16px;
    display: flex; align-items: center; gap: 10px; cursor: pointer; position: relative; transition: border .2s;
  }
  .upload-mini:hover { border-color: var(--accent); }
  .upload-mini input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-mini-icon { font-size: 20px; }
  .upload-mini-text { font-size: 13px; color: var(--muted); }

  .bill-mini-preview { display: none; align-items: center; gap: 10px; margin-top: 8px; }
  .bill-mini-thumb { width: 52px; height: 52px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; }
  .bill-mini-info { flex: 1; }
  .bill-mini-name { font-size: 12px; color: var(--muted); }
  .btn-remove-bill {
    padding: 4px 10px; background: transparent; border: 1px solid var(--danger);
    color: var(--danger); border-radius: 5px; cursor: pointer; font-size: 11px; transition: all .2s;
  }
  .btn-remove-bill:hover { background: var(--danger); color: #fff; }

  /* Items table */
  .supplier-items-wrap { padding: 12px 16px 8px; }
  .items-mini-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
  .items-mini-table th {
    text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .4px; padding: 6px 8px; border-bottom: 1px solid var(--border);
  }
  .items-mini-table td { padding: 7px 8px; border-bottom: 1px solid #1c1c1c; vertical-align: middle; }
  .items-mini-table td input {
    width: 100%; background: transparent; border: none; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; padding: 3px 0;
  }
  .items-mini-table td input:focus { border-bottom: 1px solid var(--accent); }
  .item-sub { font-size: 13px; color: var(--accent); font-weight: 600; text-align: right; white-space: nowrap; }
  .del-item-btn {
    background: none; border: none; color: var(--danger); cursor: pointer;
    font-size: 18px; padding: 0 4px; border-radius: 4px; transition: background .2s;
  }
  .del-item-btn:hover { background: rgba(224,90,90,.15); }

  .add-item-btn {
    padding: 7px 14px; background: transparent; border: 1px dashed var(--border);
    color: var(--muted); border-radius: 7px; cursor: pointer;
    font-size: 12px; font-family: 'DM Sans', sans-serif; transition: all .2s;
  }
  .add-item-btn:hover { border-color: var(--accent); color: var(--accent); }

  .supplier-footer {
    display: flex; justify-content: flex-end; align-items: center;
    gap: 12px; padding: 10px 16px; border-top: 1px solid var(--border);
  }
  .supplier-sub-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .supplier-sub-value { color: var(--accent); font-weight: 600; font-size: 16px; }

  .add-supplier-btn {
    width: 100%; padding: 13px; margin-bottom: 20px; background: transparent;
    border: 2px dashed var(--border); color: var(--muted); border-radius: 10px;
    cursor: pointer; font-size: 14px; font-family: 'DM Sans', sans-serif; transition: all .2s;
  }
  .add-supplier-btn:hover { border-color: var(--accent); color: var(--accent); }

  .grand-total-bar {
    display: flex; justify-content: flex-end; align-items: center; gap: 16px;
    padding: 20px 24px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 20px;
  }
  .grand-total-label { color: var(--muted); font-size: 14px; letter-spacing: .4px; text-transform: uppercase; }
  .grand-total-value { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--accent); }

  .save-bar { display: flex; justify-content: flex-end; margin-bottom: 32px; }
  .btn-save {
    padding: 13px 36px; background: linear-gradient(135deg, var(--accent), #a07030);
    border: none; border-radius: 10px; color: #000; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity .2s;
  }
  .btn-save:hover { opacity: .85; }

  /* OWNER */
  .expense-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--accent); }

  .owner-supplier-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
  .owner-supplier-header {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
    padding: 14px 18px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .owner-supplier-name { font-size: 15px; font-weight: 600; }
  .owner-supplier-right { display: flex; align-items: center; gap: 12px; }
  .owner-supplier-total { color: var(--accent); font-weight: 600; font-size: 15px; }
  .bill-btn {
    padding: 6px 16px; background: transparent; border: 1px solid var(--accent);
    color: var(--accent); border-radius: 7px; cursor: pointer; font-size: 12px;
    font-family: 'DM Sans', sans-serif; transition: all .2s;
  }
  .bill-btn:hover { background: var(--accent); color: #000; }

  .owner-items-table { width: 100%; border-collapse: collapse; }
  .owner-items-table th {
    text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .4px; padding: 10px 18px; border-bottom: 1px solid var(--border);
  }
  .owner-items-table td { padding: 10px 18px; border-bottom: 1px solid #1c1c1c; font-size: 14px; }
  .owner-items-table tr:last-child td { border-bottom: none; }

  .owner-grand-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; background: rgba(212,168,83,.07);
    border: 1px solid rgba(212,168,83,.2); border-radius: var(--radius); margin-bottom: 32px;
  }
  .owner-grand-label { color: var(--muted); text-transform: uppercase; font-size: 13px; letter-spacing: .5px; }
  .owner-grand-value { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--accent); }

  .no-data { text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-data-icon { font-size: 48px; margin-bottom: 12px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.9); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; max-width: 540px; width: 94%; position: relative; }
  .modal h3 { font-family: 'Playfair Display', serif; color: var(--accent); margin-bottom: 16px; font-size: 20px; }
  .modal-img { width: 100%; border-radius: 8px; max-height: 440px; object-fit: contain; background: #111; }
  .modal-close {
    position: absolute; top: 16px; right: 16px; background: var(--card); border: none;
    color: var(--text); width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background .2s;
  }
  .modal-close:hover { background: var(--danger); }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--success); color: #000;
    padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 500;
    transform: translateY(80px); opacity: 0; transition: all .3s; z-index: 1000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 600px) {
    .login-box { padding: 32px 20px; margin: 16px; }
    .content { padding: 14px; }
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="brand">
      <div class="brand-icon">📒</div>
      <h1>LedgerDesk</h1>
      <p>Business Expense Manager</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('accountant')">Accountant</button>
      <button class="role-tab" onclick="setRole('owner')">Owner</button>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="login-error">❌ Invalid username or password</div>
    <div style="margin-top:20px;padding:12px;background:var(--card);border-radius:8px;font-size:12px;color:var(--muted);line-height:1.8;">
      <strong style="color:var(--accent);">Demo credentials:</strong><br>
      Accountant → <code>accountant</code> / <code>acc123</code><br>
      Owner → <code>owner</code> / <code>own123</code>
    </div>
  </div>
</div>

<!-- ===== ACCOUNTANT ===== -->
<div id="acc-screen" class="screen">
  <div class="topbar">
    <span class="topbar-brand">📒 LedgerDesk</span>
    <span class="topbar-role">Accountant</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
  <div class="content">
    <div class="date-bar">
      <label>📅 Date:</label>
      <input type="date" id="acc-date" onchange="loadAccData()" />
    </div>

    <div class="section-card">
      <div class="section-title">Suppliers, Bills &amp; Items</div>
      <div id="suppliers-wrap"></div>
      <button class="add-supplier-btn" onclick="addSupplier()">＋ Add Supplier</button>
    </div>

    <div class="grand-total-bar">
      <span class="grand-total-label">Grand Total</span>
      <span class="grand-total-value" id="grand-total">₹0.00</span>
    </div>
    <div class="save-bar">
      <button class="btn-save" onclick="saveData()">💾 Save Entry</button>
    </div>
  </div>
</div>

<!-- ===== OWNER ===== -->
<div id="owner-screen" class="screen">
  <div class="topbar">
    <span class="topbar-brand">📒 LedgerDesk</span>
    <span class="topbar-role">Owner</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
  <div class="content">
    <div class="owner-date-bar">
      <label>📅 View expenses for:</label>
      <input type="date" id="owner-date" onchange="loadOwnerData()" />
    </div>
    <div class="expense-summary" id="owner-summary"></div>
    <div id="owner-content"></div>
  </div>
</div>

<!-- Bill Modal -->
<div class="modal-overlay" id="bill-modal" onclick="closeBillModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeBillModal()">✕</button>
    <h3 id="modal-title">🧾 Bill Image</h3>
    <img class="modal-img" id="modal-img" src="" alt="Bill" style="display:none" />
    <p id="modal-no-bill" style="color:var(--muted);font-size:14px;display:none;">No bill image uploaded for this supplier.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== AUTH =====
const USERS = {
  accountant: { pass: 'acc123', role: 'accountant' },
  owner:      { pass: 'own123', role: 'owner' }
};
let currentRole = 'accountant';

function setRole(r) {
  currentRole = r;
  document.querySelectorAll('.role-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && r === 'accountant') || (i === 1 && r === 'owner'));
  });
}

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const user = USERS[u];
  const err = document.getElementById('login-error');
  if (user && user.pass === p && user.role === currentRole) {
    err.style.display = 'none';
    showScreen(currentRole === 'accountant' ? 'acc-screen' : 'owner-screen');
    currentRole === 'accountant' ? initAccountant() : initOwner();
  } else {
    err.style.display = 'block';
  }
}

function logout() {
  showScreen('login-screen');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== STORAGE =====
function getKey(date) { return 'ledger_' + date; }
function saveEntry(date, data) { localStorage.setItem(getKey(date), JSON.stringify(data)); }
function loadEntry(date) {
  const r = localStorage.getItem(getKey(date));
  return r ? JSON.parse(r) : null;
}
function todayStr() { return new Date().toISOString().split('T')[0]; }
function formatDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${parseInt(d)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${y}`;
}

// ===== STATE =====
// suppliers = [ { name, billDataUrl, billName, items: [{name, qty, price}] } ]
let suppliers = [];

function initAccountant() {
  document.getElementById('acc-date').value = todayStr();
  loadAccData();
}

function loadAccData() {
  const date = document.getElementById('acc-date').value;
  const entry = loadEntry(date);
  suppliers = (entry && entry.suppliers) ? entry.suppliers : [];
  renderAll();
}

// ===== SUPPLIER ACTIONS =====
function addSupplier() {
  suppliers.push({ name: '', billDataUrl: null, billName: '', items: [{ name: '', qty: 1, price: 0 }] });
  renderAll();
  // focus new supplier name
  setTimeout(() => {
    const inputs = document.querySelectorAll('.supplier-name-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function removeSupplier(si) {
  suppliers.splice(si, 1);
  renderAll();
}

function updateSupplierName(si, val) {
  suppliers[si].name = val;
}

// ===== BILL ACTIONS =====
function triggerBillUpload(si) {
  document.getElementById('bill-input-' + si).click();
}

function handleBillUpload(si, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    suppliers[si].billDataUrl = ev.target.result;
    suppliers[si].billName = file.name;
    renderBillSection(si);
  };
  reader.readAsDataURL(file);
}

function removeBill(si) {
  suppliers[si].billDataUrl = null;
  suppliers[si].billName = '';
  renderBillSection(si);
}

function renderBillSection(si) {
  const uploadEl = document.getElementById('bill-upload-' + si);
  const previewEl = document.getElementById('bill-preview-' + si);
  const thumbEl = document.getElementById('bill-thumb-' + si);
  const nameEl = document.getElementById('bill-name-' + si);
  if (!uploadEl || !previewEl) return;
  const sup = suppliers[si];
  if (sup.billDataUrl) {
    uploadEl.style.display = 'none';
    previewEl.style.display = 'flex';
    thumbEl.src = sup.billDataUrl;
    nameEl.textContent = sup.billName;
  } else {
    uploadEl.style.display = 'flex';
    previewEl.style.display = 'none';
  }
}

// ===== ITEM ACTIONS =====
function addItem(si) {
  suppliers[si].items.push({ name: '', qty: 1, price: 0 });
  renderAll();
  setTimeout(() => {
    const tbody = document.getElementById('items-body-' + si);
    if (tbody) {
      const rows = tbody.querySelectorAll('tr');
      const last = rows[rows.length - 1];
      if (last) { const inp = last.querySelector('input'); if (inp) inp.focus(); }
    }
  }, 50);
}

function removeItem(si, ii) {
  if (suppliers[si].items.length === 1) {
    showToast('Each supplier needs at least 1 item', true);
    return;
  }
  suppliers[si].items.splice(ii, 1);
  renderAll();
}

function updateItemField(si, ii, field, val) {
  suppliers[si].items[ii][field] = (field === 'qty' || field === 'price') ? (parseFloat(val) || 0) : val;
  refreshTotals();
}

// ===== TOTALS =====
function supplierTotal(si) {
  return suppliers[si].items.reduce((s, it) => s + ((it.price || 0) * (it.qty || 1)), 0);
}
function calcGrand() {
  return suppliers.reduce((s, _, si) => s + supplierTotal(si), 0);
}
function refreshTotals() {
  suppliers.forEach((_, si) => {
    const el = document.getElementById('sup-total-' + si);
    if (el) el.textContent = '₹' + supplierTotal(si).toFixed(2);
    suppliers[si].items.forEach((it, ii) => {
      const cel = document.getElementById('isub-' + si + '-' + ii);
      if (cel) cel.textContent = '₹' + ((it.price || 0) * (it.qty || 1)).toFixed(2);
    });
  });
  const gt = document.getElementById('grand-total');
  if (gt) gt.textContent = '₹' + calcGrand().toFixed(2);
}

// ===== RENDER =====
function renderAll() {
  const wrap = document.getElementById('suppliers-wrap');
  if (suppliers.length === 0) {
    wrap.innerHTML = `<p style="color:var(--muted);font-size:14px;text-align:center;padding:24px 0 8px;">No suppliers yet. Click "＋ Add Supplier" below.</p>`;
    const gt = document.getElementById('grand-total');
    if (gt) gt.textContent = '₹0.00';
    return;
  }

  wrap.innerHTML = suppliers.map((sup, si) => {
    const itemRows = sup.items.map((it, ii) => `
      <tr>
        <td style="color:var(--muted);font-size:12px;width:24px">${ii + 1}</td>
        <td><input value="${esc(it.name)}" placeholder="Item name"
          oninput="updateItemField(${si},${ii},'name',this.value)" /></td>
        <td style="width:68px"><input value="${it.qty || 1}" type="number" min="1" style="text-align:center"
          oninput="updateItemField(${si},${ii},'qty',this.value)" /></td>
        <td style="width:110px"><input value="${it.price || ''}" type="number" min="0" step="0.01" placeholder="0.00"
          oninput="updateItemField(${si},${ii},'price',this.value)" /></td>
        <td class="item-sub" id="isub-${si}-${ii}">₹${((it.price||0)*(it.qty||1)).toFixed(2)}</td>
        <td style="width:30px;text-align:center">
          <button class="del-item-btn" onclick="removeItem(${si},${ii})">×</button>
        </td>
      </tr>
    `).join('');

    const hasBill = sup.billDataUrl;

    return `
      <div class="supplier-block" id="sup-block-${si}">

        <!-- Header -->
        <div class="supplier-header">
          <span class="supplier-label">Supplier</span>
          <input class="supplier-name-input" placeholder="Enter supplier name…"
            value="${esc(sup.name)}" oninput="updateSupplierName(${si}, this.value)" />
          <button class="btn-remove-sup" onclick="removeSupplier(${si})">✕ Remove</button>
        </div>

        <!-- Bill upload per supplier -->
        <div class="supplier-bill-section">
          <div class="bill-mini-label">🧾 Bill / Invoice for this supplier</div>

          <div class="upload-mini" id="bill-upload-${si}" style="${hasBill ? 'display:none' : 'display:flex'}">
            <input type="file" id="bill-input-${si}" accept="image/*"
              onchange="handleBillUpload(${si}, this)" />
            <span class="upload-mini-icon">📎</span>
            <span class="upload-mini-text">Click to attach bill image</span>
          </div>

          <div class="bill-mini-preview" id="bill-preview-${si}" style="${hasBill ? 'display:flex' : 'display:none'}">
            <img class="bill-mini-thumb" id="bill-thumb-${si}"
              src="${hasBill ? sup.billDataUrl : ''}"
              onclick="previewBill(${si})" title="Click to view full bill" />
            <div class="bill-mini-info">
              <div class="bill-mini-name" id="bill-name-${si}">${esc(sup.billName)}</div>
              <div style="margin-top:4px;display:flex;gap:8px;">
                <button class="bill-btn" style="font-size:11px;padding:4px 10px" onclick="previewBill(${si})">👁 View</button>
                <button class="btn-remove-bill" onclick="removeBill(${si})">✕ Remove</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Items -->
        <div class="supplier-items-wrap">
          <table class="items-mini-table">
            <thead>
              <tr>
                <th>#</th><th>Item Name</th>
                <th style="text-align:center">Qty</th>
                <th>Price (₹)</th>
                <th style="text-align:right">Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="items-body-${si}">${itemRows}</tbody>
          </table>
          <button class="add-item-btn" onclick="addItem(${si})">＋ Add Item</button>
        </div>

        <!-- Supplier footer total -->
        <div class="supplier-footer">
          <span class="supplier-sub-label">Supplier Total</span>
          <span class="supplier-sub-value" id="sup-total-${si}">₹${supplierTotal(si).toFixed(2)}</span>
        </div>

      </div>
    `;
  }).join('');

  const gt = document.getElementById('grand-total');
  if (gt) gt.textContent = '₹' + calcGrand().toFixed(2);
}

// ===== SAVE =====
function saveData() {
  const date = document.getElementById('acc-date').value;
  if (!date) { showToast('Please select a date', true); return; }
  saveEntry(date, { date, suppliers });
  showToast('✅ Saved for ' + formatDate(date));
}

// ===== OWNER =====
function initOwner() {
  document.getElementById('owner-date').value = todayStr();
  loadOwnerData();
}
function loadOwnerData() {
  const date = document.getElementById('owner-date').value;
  const entry = loadEntry(date);
  renderOwnerSummary(entry);
  renderOwnerContent(entry);
}

function renderOwnerSummary(entry) {
  const wrap = document.getElementById('owner-summary');
  if (!entry || !entry.suppliers || !entry.suppliers.length) { wrap.innerHTML = ''; return; }
  const total = entry.suppliers.reduce((s, sup) =>
    s + sup.items.reduce((ss, it) => ss + ((it.price||0)*(it.qty||1)), 0), 0);
  const itemCount = entry.suppliers.reduce((s, sup) => s + sup.items.length, 0);
  const billCount = entry.suppliers.filter(s => s.billDataUrl).length;
  wrap.innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Expenses</div><div class="stat-value">₹${total.toFixed(2)}</div></div>
    <div class="stat-card"><div class="stat-label">Suppliers</div><div class="stat-value">${entry.suppliers.length}</div></div>
    <div class="stat-card"><div class="stat-label">Items</div><div class="stat-value">${itemCount}</div></div>
    <div class="stat-card"><div class="stat-label">Bills Uploaded</div><div class="stat-value">${billCount}</div></div>
  `;
}

function renderOwnerContent(entry) {
  const wrap = document.getElementById('owner-content');
  if (!entry || !entry.suppliers || !entry.suppliers.length) {
    wrap.innerHTML = `<div class="no-data"><div class="no-data-icon">📭</div><p>No expense data for this date.</p></div>`;
    return;
  }
  const grandT = entry.suppliers.reduce((s, sup) =>
    s + sup.items.reduce((ss, it) => ss + ((it.price||0)*(it.qty||1)), 0), 0);

  const cards = entry.suppliers.map((sup, si) => {
    const supTotal = sup.items.reduce((s, it) => s + ((it.price||0)*(it.qty||1)), 0);
    const rows = sup.items.map((it, i) => `
      <tr>
        <td>${i+1}</td>
        <td>${esc(it.name) || '<span style="color:var(--muted)">—</span>'}</td>
        <td style="text-align:center">${it.qty||1}</td>
        <td>₹${(it.price||0).toFixed(2)}</td>
        <td style="color:var(--accent);font-weight:600;">₹${((it.price||0)*(it.qty||1)).toFixed(2)}</td>
      </tr>
    `).join('');

    const billBtn = sup.billDataUrl
      ? `<button class="bill-btn" onclick="ownerPreviewBill(${si})">🧾 View Bill</button>`
      : `<span style="color:var(--muted);font-size:12px;font-style:italic;">No bill</span>`;

    return `
      <div class="owner-supplier-card">
        <div class="owner-supplier-header">
          <span class="owner-supplier-name">🏪 ${esc(sup.name) || 'Unnamed Supplier'}</span>
          <div class="owner-supplier-right">
            ${billBtn}
            <span class="owner-supplier-total">₹${supTotal.toFixed(2)}</span>
          </div>
        </div>
        <table class="owner-items-table">
          <thead><tr><th>#</th><th>Item</th><th style="text-align:center">Qty</th><th>Unit Price</th><th>Amount</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }).join('');

  wrap.innerHTML = `
    ${cards}
    <div class="owner-grand-total">
      <span class="owner-grand-label">Grand Total</span>
      <span class="owner-grand-value">₹${grandT.toFixed(2)}</span>
    </div>
  `;

  // store entry reference for owner bill preview
  window._ownerEntry = entry;
}

// ===== BILL PREVIEW MODAL =====
function previewBill(si) {
  const sup = suppliers[si];
  openModal(sup.billDataUrl, sup.name);
}

function ownerPreviewBill(si) {
  const sup = window._ownerEntry && window._ownerEntry.suppliers[si];
  if (!sup) return;
  openModal(sup.billDataUrl, sup.name);
}

function openModal(dataUrl, supplierName) {
  const modal = document.getElementById('bill-modal');
  const img = document.getElementById('modal-img');
  const noB = document.getElementById('modal-no-bill');
  const title = document.getElementById('modal-title');
  title.textContent = '🧾 Bill — ' + (supplierName || 'Supplier');
  if (dataUrl) {
    img.src = dataUrl; img.style.display = 'block'; noB.style.display = 'none';
  } else {
    img.style.display = 'none'; noB.style.display = 'block';
  }
  modal.classList.add('open');
}

function closeBillModal(e) {
  if (e && e.target !== document.getElementById('bill-modal')) return;
  document.getElementById('bill-modal').classList.remove('open');
}

// ===== UTILS =====
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? 'var(--danger)' : 'var(--success)';
  t.style.color = err ? '#fff' : '#000';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('acc-date').value = todayStr();
  document.getElementById('owner-date').value = todayStr();
});
</script>
</body>
</html>
